<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOK Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>TOK Analyzer</h1>

<div class="input-section">

    <label>Source URL</label>

    <input
        type="text"
        id="urlInput"
        placeholder="Paste article, website, YouTube, PDF, research paper or social media URL">

    <div class="controls-grid">

        <div class="control-card">

            <label>User Type</label>

            <select id="userType">
                <option value="learner">Learner</option>
                <option value="teacher">Teacher</option>
            </select>

        </div>

        <div class="control-card">

            <label>Analysis Type</label>

            <select id="analysisType">

                <option value="kq">
                    Knowledge Questions
                </option>

                <option value="discussion">
                    Classroom Discussion
                </option>

                <option value="exhibition">
                    Exhibition
                </option>

                <option value="essay">
                    Essay
                </option>

                <option value="complete">
                    Complete TOK Analysis
                </option>

            </select>

        </div>

        <div class="control-card">

            <label>Source Type</label>

            <select id="sourceType">

                <option value="auto">
                    Auto Detect
                </option>

                <option value="news">
                    News Article
                </option>

                <option value="website">
                    Website
                </option>

                <option value="youtube">
                    YouTube Video
                </option>

                <option value="pdf">
                    PDF
                </option>

                <option value="research">
                    Research Paper
                </option>

                <option value="social">
                    Social Media
                </option>

            </select>

        </div>

    </div>

    <button onclick="generateKQ()">
        Analyze Source
    </button>

</div>

<div id="loading"></div>

<div id="results"></div>


</div>

<script src="app.js"></script>

</body>

</html>
